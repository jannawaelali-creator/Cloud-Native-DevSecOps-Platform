apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: monitoring
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 75.0.0

  destination:
    server: https://kubernetes.default.svc
    namespace: devops-project

  syncPolicy:
    automated:
      prune: true
      selfHeal: true