apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: devops-project
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  tls:
  - hosts: 
    - app.com
    secretName: app-tls-secret
        
  rules:
  - host: app.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-svc
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-svc
            port:
              number: 8080

      - path: /health
        pathType: Prefix
        backend:
          service:
            name: backend-svc
            port:
              number: 8080 

      - path: /grafana 
        pathType: Prefix
        backend:
          service:
            name: grafana-svc
            port:
              number: 80              
